name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pikepdf pymupdf img2pdf pillow pyside6 pyinstaller pytest

      - name: Run tests
        run: python -m pytest tests -q

      - name: Build executable
        run: pyinstaller build/kpdf.spec --distpath build/dist --workpath build/work --log-level INFO

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: kpdf-windows-exe
          path: build/dist/kpdf.exe
